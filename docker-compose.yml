services:
  postgres:
    image: postgres:17-alpine
    container_name: ac-postgres
    environment:
      POSTGRES_USER: ac
      POSTGRES_PASSWORD: ac
      POSTGRES_DB: ac_events
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
