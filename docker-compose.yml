services:
  postgres:
    image: postgres:17-alpine
    container_name: ac-postgres
    environment:
      POSTGRES_USER: ac
      POSTGRES_PASSWORD: ac
      POSTGRES_DB: ac_events
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ac -d ac_events"]
      interval: 5s
      timeout: 5s
      retries: 12

  metabase:
    image: metabase/metabase:latest
    container_name: ac-metabase
    ports:
      - "3002:3000"
    volumes:
      - metabase-data:/metabase-data
    environment:
      - MB_DB_TYPE=postgres
      - MB_DB_DBNAME=metabase_app
      - MB_DB_PORT=5432
      - MB_DB_USER=ac
      - MB_DB_PASS=ac
      - MB_DB_HOST=postgres
    depends_on:
      postgres:
        condition: service_healthy

  metabase-gateway:
    image: nginx:alpine
    container_name: ac-metabase-gateway
    depends_on:
      - metabase
    ports:
      - "3001:80"
    volumes:
      - ./metabase/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
  metabase-data:
